{% extends "base.html" %}
{% block title %}Register | GoalTracker{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-panel">
    <h1 class="display-6 fw-bold">Create your workspace</h1>
    <p class="text-secondary">Track goals, skills, tasks, and courses in one private place.</p>
    <form method="post" class="mt-4">
      <div class="mb-3">
        <label class="form-label">Full name</label>
        <input class="form-control form-control-lg" name="full_name">
      </div>
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input class="form-control form-control-lg" name="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control form-control-lg" name="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control form-control-lg" name="password" required>
      </div>
      <button class="btn btn-primary btn-lg w-100">Create account</button>
    </form>
    <p class="mt-3 mb-0">Already registered? <a href="{{ url_for('main.login') }}">Login</a></p>
  </div>
</div>
{% endblock %}
