{% extends "base.html" %}
{% block title %}Login | GoalTracker{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-panel">
    <h1 class="display-6 fw-bold">Welcome back</h1>
    <p class="text-secondary">Pick up your DevOps interview plan where you left off.</p>
    <form method="post" class="mt-4">
      <div class="mb-3">
        <label class="form-label">Username or email</label>
        <input class="form-control form-control-lg" name="identifier" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control form-control-lg" name="password" required>
      </div>
      <button class="btn btn-primary btn-lg w-100">Login</button>
    </form>
    <p class="mt-3 mb-0">New here? <a href="{{ url_for('main.register') }}">Create an account</a></p>
  </div>
</div>
{% endblock %}
