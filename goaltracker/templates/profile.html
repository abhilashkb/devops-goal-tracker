{% extends "base.html" %}
{% block title %}Profile | GoalTracker{% endblock %}
{% block content %}
<div class="panel-card">
  <h1 class="display-6 fw-bold mb-4">Profile</h1>
  <form method="post" class="row g-3">
    <div class="col-lg-6">
      <label class="form-label">Full name</label>
      <input class="form-control" name="full_name" value="{{ current_user.full_name }}">
    </div>
    <div class="col-12">
      <label class="form-label">Bio</label>
      <textarea class="form-control" name="bio" rows="5">{{ current_user.bio }}</textarea>
    </div>
    <div class="col-12 d-flex justify-content-end">
      <button class="btn btn-primary">Save profile</button>
    </div>
  </form>
</div>
{% endblock %}
